name: Frontend CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: frontend-prod
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
  VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://3-34-80-58.nip.io' }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Build
        run: |
          set -euo pipefail
          npm ci
          npm run build

      - name: Package
        run: |
          set -euo pipefail
          tar -C dist -czf "${RUNNER_TEMP}/libra-frontend.tar.gz" .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN || 'arn:aws:iam::271030592697:role/libra-github-actions-deploy' }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload artifact
        env:
          DEPLOY_BUCKET: ${{ vars.DEPLOY_BUCKET || 'libra-reports-03c4c54f' }}
        run: |
          set -euo pipefail
          aws s3 cp "${RUNNER_TEMP}/libra-frontend.tar.gz" "s3://${DEPLOY_BUCKET}/deploy-artifacts/frontend/${GITHUB_SHA}/libra-frontend.tar.gz"

      - name: Deploy through SSM
        env:
          API_INSTANCE_ID: ${{ vars.API_INSTANCE_ID || 'i-0b630f2c976779409' }}
          DEPLOY_BUCKET: ${{ vars.DEPLOY_BUCKET || 'libra-reports-03c4c54f' }}
        run: |
          set -euo pipefail

          cat > ssm-params.json <<EOF
          {
            "commands": [
              "set -eu",
              "aws s3 cp s3://${DEPLOY_BUCKET}/deploy-artifacts/frontend/${GITHUB_SHA}/libra-frontend.tar.gz /tmp/libra-frontend.tar.gz",
              "rm -rf /tmp/libra-frontend-dist",
              "mkdir -p /tmp/libra-frontend-dist",
              "tar -xzf /tmp/libra-frontend.tar.gz -C /tmp/libra-frontend-dist",
              "rm -rf /var/www/libra-frontend",
              "install -d -m 0755 /var/www/libra-frontend",
              "cp -R /tmp/libra-frontend-dist/. /var/www/libra-frontend/",
              "chown -R www-data:www-data /var/www/libra-frontend",
              "chmod -R a+rX,u+w /var/www/libra-frontend",
              "nginx -t",
              "systemctl reload nginx",
              "curl -fsS http://127.0.0.1/ >/dev/null"
            ]
          }
          EOF

          command_id="$(aws ssm send-command \
            --instance-ids "${API_INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy libra-frontend ${GITHUB_SHA}" \
            --parameters file://ssm-params.json \
            --query "Command.CommandId" \
            --output text)"

          set +e
          aws ssm wait command-executed --command-id "${command_id}" --instance-id "${API_INSTANCE_ID}"
          wait_status=$?
          set -e

          aws ssm get-command-invocation \
            --command-id "${command_id}" \
            --instance-id "${API_INSTANCE_ID}" \
            --query "{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}" \
            --output json

          exit "${wait_status}"
